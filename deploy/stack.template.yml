version: "3.9"

services:
  sollucion_site:
    image: ${APP_IMAGE}
    command:
      - sh
      - -lc
      - |
        rm -f tmp/pids/server.pid
        until pg_isready -h sollucion_site_db -p 5432 -U sollucion_institutional -d sollucion_institutional_production >/dev/null 2>&1; do
          echo "waiting for sollucion_institutional database..."
          sleep 2
        done
        bundle exec rails db:prepare
        exec ./bin/rails server -b 0.0.0.0 -p 3000
    environment:
      RAILS_ENV: production
      RACK_ENV: production
      PORT: "3000"
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      FORCE_SSL: "true"
      PGHOST: "sollucion_site_db"
      PGPORT: "5432"
      PGUSER: "sollucion_institutional"
      PGDATABASE: "sollucion_institutional_production"
      PGPASSWORD: ${SOLLUCION_INSTITUTIONAL_DATABASE_PASSWORD}
      SOLLUCION_INSTITUTIONAL_DATABASE_PASSWORD: ${SOLLUCION_INSTITUTIONAL_DATABASE_PASSWORD}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_TO: ${MAIL_TO}
      CONTACT_FORM_FROM_EMAIL: ${CONTACT_FORM_FROM_EMAIL}
      CONTACT_FORM_TO_EMAIL: ${CONTACT_FORM_TO_EMAIL}
      DEPLOY_NONCE: ${DEPLOY_NONCE}
    volumes:
      - sollucion_institutional_storage:/rails/storage
    networks:
      - app_net
      - traefik_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=SollucionNet
        - traefik.http.routers.sollucion_site.rule=Host(`sollucion.com`)
        - traefik.http.routers.sollucion_site.entrypoints=websecure
        - traefik.http.routers.sollucion_site.tls.certresolver=letsencryptresolver
        - traefik.http.routers.sollucion_site.service=sollucion_site
        - traefik.http.routers.sollucion_site.middlewares=sollucion_site_sslheader
        - traefik.http.middlewares.sollucion_site_sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.services.sollucion_site.loadbalancer.server.port=3000
        - traefik.http.services.sollucion_site.loadbalancer.passHostHeader=true

  sollucion_site_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sollucion_institutional_production
      POSTGRES_USER: sollucion_institutional
      POSTGRES_PASSWORD: ${SOLLUCION_INSTITUTIONAL_DATABASE_PASSWORD}
    volumes:
      - sollucion_institutional_postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sollucion_institutional -d sollucion_institutional_production"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  sollucion_institutional_postgres_data:
  sollucion_institutional_storage:

networks:
  app_net:
  traefik_net:
    external: true
    name: SollucionNet
